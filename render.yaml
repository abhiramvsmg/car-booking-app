databases:
  - name: cab-booking-db
    databaseName: cab_booking
    user: cab_admin
    plan: free

services:
  - type: web
    name: cab-booking-backend
    env: docker
    plan: free
    region: oregon
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cab-booking-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Add the rest of your keys manually in the Render Dashboard after deployment
      - key: STRIPE_API_KEY
        value: "add-your-stripe-key-here"
      - key: STRIPE_WEBHOOK_SECRET
        value: "add-your-stripe-webhook-secret-here"
      - key: GOOGLE_MAPS_API_KEY
        value: "add-your-google-maps-key-here"

  - type: web
    name: cab-booking-frontend
    env: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://cab-booking-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://cab-booking-backend.onrender.com
      - key: NEXT_PUBLIC_MAPS_API_KEY
        value: "add-your-google-maps-key-here"
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        value: "add-your-stripe-public-key-here"
